<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Калькулятор - Путь к Балансу</title>
  <style>
    body {
      font-family: Arial;
      background: #f2f2f2;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .box {
      background: white;
      padding: 20px;
      border-radius: 10px;
      width: 340px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    input, select {
      width: 100%;
      padding: 10px;
      margin: 6px 0;
    }
    button {
      width: 100%;
      padding: 10px;
      background: #2e7d32;
      color: white;
      border: none;
      cursor: pointer;
    }
    .result {
      margin-top: 10px;
      font-weight: bold;
      font-size: 18px;
    }
  </style>
</head>
<body>

<div class="box">
  <h2>Калькулятор блоков</h2>

  <input id="height" placeholder="Рост (см)">
  <input id="weight" placeholder="Вес (кг)">
  <input id="waist" placeholder="Обхват талии (см)">
  <input id="hip" placeholder="Обхват бёдер (см)">

  <select id="activity">
    <option value="1">Малоподвижный</option>
    <option value="1.2">Лёгкая активность</option>
    <option value="1.5">Активный</option>
  </select>

  <button onclick="calc()">Рассчитать блоки</button>

  <div class="result" id="result"></div>
</div>

<script>
function calc() {
  let h = Number(document.getElementById('height').value);
  let w = Number(document.getElementById('weight').value);
  let waist = Number(document.getElementById('waist').value);
  let hip = Number(document.getElementById('hip').value);
  let act = Number(document.getElementById('activity').value);

  let base = (w * 0.1) + (h / 100);
  let shape = (hip - waist) / 25;
  let blocks = Math.round((base + shape) * act);

  if (blocks < 1) blocks = 1;

  document.getElementById('result').innerText =
    "Блоки в день: " + blocks;
}
</script>

</body>
</html>
