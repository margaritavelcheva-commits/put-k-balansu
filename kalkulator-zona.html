<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8">
  <title>Калкулатор Блокове</title>
  <style>
    body {
      font-family: Arial;
      background: #f2f2f2;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .box {
      background: white;
      padding: 20px;
      border-radius: 10px;
      width: 320px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    input {
      width: 100%;
      padding: 10px;
      margin: 5px 0;
    }
    button {
      width: 100%;
      padding: 10px;
      background: #2e7d32;
      color: white;
      border: none;
      cursor: pointer;
    }
    .result {
      margin-top: 10px;
      font-weight: bold;
      font-size: 18px;
    }
  </style>
</head>
<body>

<div class="box">
  <h2>Калкулатор - Път към Баланса</h2>

  <input id="waist" placeholder="Обиколка талия (см)">
  <input id="hip" placeholder="Обиколка ханш (см)">
  <input id="weight" placeholder="Тегло (кг)">

  <button onclick="calc()">Изчисли</button>

  <div class="result" id="result"></div>
</div>

<script>
function calc() {
  let waist = Number(document.getElementById('waist').value);
  let hip = Number(document.getElementById('hip').value);
  let weight = Number(document.getElementById('weight').value);

  // проста логика за “блокове”
  let blocks = Math.round((weight / 10) + (hip - waist) / 20);

  if (blocks < 1) blocks = 1;

  document.getElementById('result').innerText =
    "Блокове на ден: " + blocks;
}
</script>

</body>
</html>
