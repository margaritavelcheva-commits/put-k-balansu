<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Завтрак</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  color:white;
}

/* HOME */
.home{
  position:fixed;
  top:15px;
  left:15px;
  background:rgba(255,255,255,0.25);
  color:white;
  padding:10px 12px;
  border-radius:10px;
  text-decoration:none;
  z-index:9999;
}

/* LAYOUT */
.container{
  text-align:center;
  margin-top:80px;
}

h1{
  margin-bottom:5px;
}

.subtitle{
  opacity:0.8;
  margin-bottom:30px;
}

/* CARDS */
.grid{
  display:flex;
  justify-content:center;
  gap:15px;
  flex-wrap:wrap;
}

.card{
  width:180px;
  padding:20px;
  border-radius:15px;
  background:rgba(255,255,255,0.12);
  cursor:pointer;
  transition:0.3s;
}

.card:hover{
  transform:scale(1.05);
  background:rgba(255,255,255,0.25);
}

.card.active{
  outline:2px solid #00ffcc;
}

button{
  margin-top:25px;
  padding:10px 15px;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

#result{
  margin-top:20px;
  font-size:18px;
}
</style>
</head>

<body>

<a class="home" href="index.html">🏠 Home</a>

<div class="container">

<h1>🍳 Завтрак</h1>
<div class="subtitle">Соберите меню из 3 блоков</div>

<div class="grid">
  <div class="card" onclick="toggle(this)">🥚 Белки</div>
  <div class="card" onclick="toggle(this)">🍞 Углеводы</div>
  <div class="card" onclick="toggle(this)">🧈 Жиры</div>
</div>

<button onclick="check()">Проверить</button>

<div id="result"></div>

</div>

<script>
let count = 0;

function toggle(el){
  if(el.classList.contains("active")){
    el.classList.remove("active");
    count--;
  } else {
    el.classList.add("active");
    count++;
  }
}

function check(){
  if(count === 3){
    document.getElementById("result").innerText =
      "Меню собрано правильно 👍";
  } else {
    document.getElementById("result").innerText =
      "Нужно выбрать 3 блока";
  }
}
</script>

</body>
</html>
