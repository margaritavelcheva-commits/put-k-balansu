<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Завтрак</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      color: white;
    }

    .home {
      position: fixed;
      top: 15px;
      left: 15px;
      background: rgba(255,255,255,0.25);
      color: white;
      padding: 10px 12px;
      border-radius: 10px;
      text-decoration: none;
      z-index: 9999;
    }

    .container {
      max-width: 900px;
      margin: 90px auto;
      text-align: center;
    }

    h1 {
      margin-bottom: 10px;
    }

    .desc {
      opacity: 0.8;
      margin-bottom: 30px;
    }

    .grid {
      display: flex;
      justify-content: center;
      gap: 15px;
      flex-wrap: wrap;
    }

    .card {
      background: rgba(255,255,255,0.12);
      padding: 25px;
      border-radius: 15px;
      width: 180px;
      cursor: pointer;
      transition: 0.3s;
    }

    .card:hover {
      transform: scale(1.08);
      background: rgba(255,255,255,0.2);
    }

    .selected {
      outline: 2px solid #00ffcc;
    }

    button {
      margin-top: 25px;
      padding: 10px 18px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }

    #result {
      margin-top: 25px;
      font-size: 18px;
    }
  </style>
</head>

<body>

<a class="home" href="index.html">🏠 Home</a>

<div class="container">

  <h1>🍳 Завтрак</h1>
  <div class="desc">Соберите меню из 3 блоков</div>

  <div class="grid">
    <div class="card" onclick="toggle(this,'protein')">🥚 Белки</div>
    <div class="card" onclick="toggle(this,'carbs')">🍞 Углеводы</div>
    <div class="card" onclick="toggle(this,'fat')">🧈 Жиры</div>
  </div>

  <button onclick="check()">Проверить</button>

  <div id="result"></div>

</div>

<script>
let selected = [];

function toggle(el, type) {
  if (selected.includes(type)) {
    selected = selected.filter(t => t !== type);
    el.classList.remove("selected");
  } else {
    selected.push(type);
    el.classList.add("selected");
  }
}

function check() {
  if (selected.length !== 3) {
    document.getElementById("result").innerText =
      "Нужно выбрать ровно 3 блока";
    return;
  }

  document.getElementById("result").innerText =
    "Меню собрано правильно 👍";
}
</script>

</body>
</html>
