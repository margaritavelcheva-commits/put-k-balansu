<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Собери меню — Блоки питания</title>
<style>
*{box-sizing:border-box}
body{margin:0;font-family:Arial,sans-serif;background:linear-gradient(135deg,#0f172a,#1e3a8a);color:#fff}
.wrap{max-width:980px;margin:auto;padding:20px}
.card{background:rgba(255,255,255,.08);padding:22px;border-radius:24px;backdrop-filter:blur(12px)}
h1,h2{margin:.3em 0}
.progress{height:12px;background:#223;border-radius:999px;overflow:hidden}
.progress>div{height:100%;background:linear-gradient(90deg,#60a5fa,#4ade80);transition:.4s}
.row{display:flex;justify-content:space-between;gap:10px;background:#14213d;padding:10px;border-radius:14px;margin:10px 0}
input{width:120px;padding:10px;border:none;border-radius:10px}
button{padding:12px 14px;border:none;border-radius:12px;margin:6px;cursor:pointer}
.primary{background:#4ade80}
.secondary{background:#334155;color:#fff}
.small{opacity:.85}
.good{color:#4ade80}
.bad{color:#fb7185}
@media(max-width:700px){.row{flex-direction:column}input{width:100%}}
</style>
</head>
<body>
<div class="wrap"><div class="card" id="app"></div></div>
<script>
const slides=[
{title:"Завтрак",blocks:3,answer:{"Котидж":250,"Груша":148,"Овсяные отруби":18,"Миндаль":4,"Маслины":40},hint:"Собирайте блоки постепенно."},
{title:"Перекус",blocks:2,answer:{"Яичные белки":220,"Клубника":260,"Авокадо":60},hint:"Авокадо помогает с жирами."},
{title:"Обед",blocks:5,answer:{"Индейка":380,"Яблоко":300,"Салат":200,"Авокадо":100,"Миндаль":15},hint:"Не опирайтесь на один продукт."},
{title:"Перекус",blocks:3,answer:{"Йогурт":300,"Банан":180,"Смородина":120,"Маслины":45},hint:"Смотрите на баланс."},
{title:"Ужин",blocks:4,answer:{"Лосось":260,"Брокколи на пару":300,"Нут варёный":260,"Авокадо":70},hint:"Комбинируйте продукты."}
];
let idx=0;
function render(){
 const app=document.getElementById("app");
 if(idx>=slides.length){
   app.innerHTML=`<h1>🎉 Поздравляем!</h1>
   <p>Спасибо за игру!</p>
   <p>Вы дошли до конца и потренировали расчёт блоков и комбинации продуктов.</p>
   <button class="primary" onclick="idx=0;render()">Играть снова</button>`;
   return;
 }
 const s=slides[idx];
 app.innerHTML=`
 <div class="progress"><div style="width:${idx/slides.length*100}%"></div></div>
 <h2>${s.title}</h2>
 <p>Соберите меню из ${s.blocks} блоков. Комбинируйте продукты так, чтобы итог совпал.</p>
 <p>🥛 ${s.blocks} ББ &nbsp; 🍐 ${s.blocks} БУ &nbsp; 🥑 ${s.blocks} БЖ</p>
 ${Object.keys(s.answer).map(p=>`<div class=row><span>${p}</span><input data-n="${p}" type=number placeholder="г"></div>`).join("")}
 <div id=live class=small></div>
 <p class=small>Подсказка: ${s.hint}</p>
 <button class=primary onclick="check()">Проверить</button>
 <button class=secondary onclick="showAnswer()">Показать правильный ответ</button>
 <button class=secondary onclick="idx++;render()">Продолжить →</button>
 <div id=result></div>`;
 document.querySelectorAll("input").forEach(i=>i.oninput=update);
}
function update(){
 let t=slides[idx].blocks;
 let filled=[...document.querySelectorAll("input")].filter(i=>+i.value>0).length;
 let val=Math.min(filled,t);
 live.innerHTML=`Белки ${"█".repeat(val)}${"░".repeat(Math.max(0,t-val))} ${val}/${t}<br>
 Углеводы ${"█".repeat(val)}${"░".repeat(Math.max(0,t-val))} ${val}/${t}<br>
 Жиры ${"█".repeat(val)}${"░".repeat(Math.max(0,t-val))} ${val}/${t}`;
}
function check(){
 const s=slides[idx];
 let ok=true;
 [...document.querySelectorAll("input")].forEach(i=>{
   if(Math.abs((+i.value||0)-s.answer[i.dataset.n])>5) ok=false;
 });
 result.innerHTML=ok?
 `<h2 class=good>✅ Верно</h2><p>Отличная работа!</p>`:
 `<h2 class=bad>❌ Есть ошибки</h2>`;
}
function showAnswer(){
 result.innerHTML="<b>Правильный пример:</b><br>"+Object.entries(slides[idx].answer).map(v=>v[0]+" — "+v[1]+" г").join("<br>");
}
render();
</script>
</body>
</html>
