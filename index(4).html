<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8">
  <title>Игра 2</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      color: white;
    }

    /* HOME BUTTON */
    .home {
      position: fixed;
      top: 15px;
      left: 15px;
      background: rgba(255,255,255,0.25);
      color: white;
      padding: 10px 12px;
      border-radius: 10px;
      text-decoration: none;
      font-family: Arial;
      z-index: 9999;
      transition: 0.3s;
    }

    .home:hover {
      transform: scale(1.05);
      background: rgba(255,255,255,0.35);
    }

    /* PAGE CONTENT */
    .container {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      flex-direction: column;
      text-align: center;
    }

    .box {
      background: rgba(255,255,255,0.12);
      padding: 30px;
      border-radius: 15px;
      backdrop-filter: blur(8px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }
  </style>
</head>

<body>

<a class="home" href="index.html">🏠 Home</a>

<div class="container">
  <div class="box">
    <h1>🎮 Игра 2</h1>
    <p>Тук е твоят гейм съдържание</p>
  </div>
</div>

</body>
</html>
